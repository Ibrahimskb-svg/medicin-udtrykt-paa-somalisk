function hexToRgba(hex, a){
  const h = (hex || "").replace("#","").trim();
  if (h.length !== 6) return `rgba(0,0,0,${a})`;
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyTheme(lang){
  const th = THEME[lang] || THEME.so;
  document.documentElement.style.setProperty("--c1", th.c1);
  document.documentElement.style.setProperty("--c2", th.c2);
  document.documentElement.style.setProperty("--accent", th.accent);
  document.documentElement.style.setProperty("--accent-soft", hexToRgba(th.accent, 0.16));
  document.documentElement.style.setProperty("--accent-soft2", hexToRgba(th.accent, 0.10));
}

function setDirLang(lang){
  document.documentElement.lang = lang;
  document.documentElement.dir = RTL.has(lang) ? "rtl" : "ltr";
}

function fillList(id, arr){
  const ul = document.getElementById(id);
  ul.innerHTML = "";
  (arr || []).forEach(txt => {
    const li = document.createElement("li");
    li.innerHTML = txt;
    ul.appendChild(li);
  });
}

function setSectionTitle(elId, title){
  const el = document.getElementById(elId);
  if(!el) return;
  el.textContent = (title || "").trim();

function applyLang(lang){
  const d = T[lang] || T.so;

  applyTheme(lang);
  setDirLang(lang);

  document.title = d.pageTitle;
  document.getElementById("hdrH1").textContent = d.hdrH1;
  document.getElementById("hdrP").textContent = d.hdrP;
  document.getElementById("backText").textContent = d.backText;
  document.getElementById("langLabel").textContent = d.langLabel;

  document.getElementById("drugName").textContent = d.drugName;
  document.getElementById("drugForm").textContent = d.drugForm;
  document.getElementById("badgeText").textContent = d.badgeText;

  setSectionTitle("sec0Title", d.sec0Title);
  setSectionTitle("sec1Title", d.sec1Title);
  setSectionTitle("sec2Title", d.sec2Title);
  setSectionTitle("sec3Title", d.sec3Title);
  setSectionTitle("sec4Title", d.sec4Title);
  setSectionTitle("sec5Title", d.sec5Title);
  setSectionTitle("sec6Title", d.sec6Title);
  setSectionTitle("sec7Title", d.sec7Title);
  setSectionTitle("sec8Title", d.sec8Title);

  fillList("sec0List", d.sec0);
  fillList("sec1List", d.sec1);
  fillList("sec2List", d.sec2);
  fillList("sec3List", d.sec3);
  fillList("sec4List", d.sec4);
  fillList("sec5List", d.sec5);
  fillList("sec6List", d.sec6);
  fillList("sec7List", d.sec7);
  fillList("sec8List", d.sec8);

  document.getElementById("footer1").textContent = d.footer1;
  document.getElementById("footer2").innerHTML = d.footer2;

  const backA = document.querySelector("a.back");
  const base = backA.getAttribute("href").split("?")[0];
  backA.setAttribute("href", base + "?lang=" + encodeURIComponent(lang));
}

const params = new URLSearchParams(window.location.search);
const startLang = params.get("lang") || "so";
document.getElementById("langSelect").value = (T[startLang] ? startLang : "so");
applyLang(document.getElementById("langSelect").value);

document.getElementById("langSelect").addEventListener("change", function(){
  applyLang(this.value);
});
