<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8""")/>>
<meta name="viewport" content="width=device-width, initial-scale=1.0""")/>>
<title>Amlodipin – dhiig-karka</title>
<style>
:root{
  --accent1:#0066cc; /* Den blå farve fra din overskrift */
  --accent2:#00509e;
  --bg:#ffffff;
  --text:#123047;
  --muted:#607089;
  --stroke:#d0d7e2;
  --pillBg:#d9f6e8;
  --pillText:#16634a;
}

body{ font-family: Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }

/* HEADER FRA BILLEDE */
header{ background: #ffffff; padding: 30px 20px 10px; max-width: 820px; margin: 0 auto; }
.drug-header-row { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px dashed var(--stroke); padding-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.drug-main-info { display: flex; align-items: center; gap: 15px; }
.drug-icon-box { width: 52px; height: 52px; background: #f0f7ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid #e0e8f0; }
.drug-icon-box svg { width: 32px; height: 32px; stroke: var(--accent1); fill: none; stroke-width: 2; }
.drug-title-block { display: flex; flex-direction: column; }
.drug-name-top { font-weight: 800; font-size: 1.5rem; color: var(--accent1); margin: 0; }
.drug-form-sub { font-size: 1rem; color: var(--muted); margin-top: 4px; }
.badge-green { background: var(--pillBg); color: var(--pillText); padding: 6px 14px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; }

main{ max-width: 820px; margin: 0 auto 50px; padding: 0 20px; }

/* SPROGVÆLGER */
.langbar{ display:flex; align-items:center; gap:10px; padding: 15px 0; margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; }
.langbar label{ font-size:0.9rem; font-weight:600; }
.langbar select{ padding: 8px 12px; border-radius: 10px; border: 1px solid var(--stroke); font-size: 0.9rem; background: #fff; }

.section { margin-top: 30px; }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
.section-title { font-weight: 800; color: #123047; font-size: 1.15rem; }
.section ul { margin: 0; padding-left: 25px; font-size: 1.05rem; }
.section ul li { margin-bottom: 12px; color: #334155; }

.footer-note { font-size: 0.95rem; color: var(--text); text-align: center; margin-top: 60px; padding: 30px; border-top: 1px solid var(--stroke); background: #fafafa; border-radius: 0 0 15px 15px; }

@media (max-width: 600px){
  .drug-name-top { font-size: 1.3rem; }
  .drug-header-row { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<header>
  <div class="drug-header-row">
    <div class="drug-main-info">
      <div class="drug-icon-box">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
      </div>
      <div class="drug-title-block">
        <h1 class="drug-name-top" id="drugName">Amlodipin – dhiig-karka</h1>
        <span class="drug-form-sub" id="drugForm">Kiniin afka ah</span>
      </div>
    </div>
    <div class="badge-green" id="badgeText">Akhris fudud oo kooban</div>
  </div>
</header>

<main>
  <div class="langbar">
    <label for="langSelect" id="langLabel">Dooro luqadda:</label>
    <select id="langSelect" onchange="updateLanguage()">
      <option value="so" selected>Somalisk</option>
      <option value="da">Dansk</option>
      <option value="en">Engelsk</option>
      <option value="ar">Arabisk</option>
    </select>
  </div>

  <div class="section">
    <div class="section-header">
      <span style="font-size:1.6rem">💊</span>
      <div class="section-title" id="useTitle">Isticmaalka</div>
    </div>
    <ul id="useList"></ul>
  </div>

  <div class="section">
    <div class="section-header">
      <span style="font-size:1.6rem">⏰</span>
      <div class="section-title" id="doseTitle">Qiyaasta iyo Talooyinka Ibraahim</div>
    </div>
    <ul id="doseList"></ul>
  </div>

  <div class="section">
    <div class="section-header">
      <span style="font-size:1.6rem">⚠️</span>
      <div class="section-title" id="sideTitle">Waxyeellooyinka muhiimka ah</div>
    </div>
    <ul id="sideList"></ul>
  </div>

  <div class="footer-note" id="footerNote">Qoraalkan waxaa diyaariyay farmakonom: Ibraahim Dahir Xanaf</div>
</main>

    drugName: "Amlodipin – dhiig-karka",
    drugForm: "Tabletter",
    badgeText: "Kort og letlæselig",
    langLabel: "Vælg sprog:",
    useTitle: "Anvendelse",
    useList: [
      "Amlodipin får blodkarrene til at slappe af, så trykket falder.",
      "Det forebygger brystsmerter og aflaster hjertet.",
      "Husk: Højt blodtryk er en 'stille dræber' – tag medicinen, selvom du føler dig rask."
    ],

function updateLanguage() {
  const lang = document.getElementById('langSelect').value;
  const data = content[lang];
  
  document.getElementById('drugName').innerText = data.drugName;
  document.getElementById('drugForm').innerText = data.drugForm;
  document.getElementById('badgeText').innerText = data.badgeText;
  document.getElementById('langLabel').innerText = data.langLabel;
  document.getElementById('useTitle').innerText = data.useTitle;
  document.getElementById('doseTitle').innerText = data.doseTitle;
  document.getElementById('sideTitle').innerText = data.sideTitle;
  document.getElementById('footerNote').innerText = data.footerNote;

  const updateList = (id, list) => {
    const el = document.getElementById(id);
    el.innerHTML = "";
    list.forEach(item => {
      const li = document.createElement('li');
      li.innerText = item;
      el.appendChild(li);
    });
  };

  updateList('useList', data.useList);
  updateList('doseList', data.doseList);
  updateList('sideList', data.sideList);
}

updateLanguage(); // Initialize
</script>
</body>
</html>
